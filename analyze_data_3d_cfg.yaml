# Configuration file for 3D data analysis
# Frame rate
fps: 20

# Joint names (standard mouse skeleton)
joint_names:
  - EarL
  - EarR
  - Snout
  - SpineF
  - SpineM
  - TailB
  - TailM
  - ForepawL
  - ElbowL
  - WristL
  - ShoulderL
  - ForepawR
  - WristR
  - ElbowR
  - ShoulderR
  - HindpawL
  - AnkleL
  - KneeL
  - HindpawR
  - AnkleR
  - KneeR

# Simplified joint names
simp_joint_names:
  - EarL
  - EarR
  - Snout
  - SpineF
  - SpineM
  - TailB
  - TailM
  - ForepawL
  - ShoulderL
  - ForepawR
  - ShoulderR
  - HindpawL
  - KneeL
  - HindpawR
  - KneeR

# Limb combinations for simplification
limb_combos:
  EarL: ['EarL']
  EarR: ['EarR']
  Snout: ['Snout']
  SpineF: ['SpineF']
  SpineM: ['SpineM']
  TailB: ['TailB']
  TailM: ['TailM']
  ForepawL: ['ForepawL', 'ElbowL']
  ShoulderL: ['WristL', 'ShoulderL']
  ForepawR: ['ForepawR', 'ElbowR']
  ShoulderR: ['WristR', 'ShoulderR']
  HindpawL: ['HindpawL', 'AnkleL']
  KneeL: ['KneeL']
  HindpawR: ['HindpawR', 'AnkleR']
  KneeR: ['KneeR']

# Limb order for kinematic chain
limb_orders:
  EarL: 2
  EarR: 2
  Snout: 3
  SpineF: 2
  SpineM: 1
  TailB: 2
  TailM: 4
  ShoulderL: 3
  ElbowL: 4
  WristL: 5
  ForepawL: 6
  ShoulderR: 3
  ElbowR: 4
  WristR: 5
  ForepawR: 6
  KneeL: 3
  AnkleL: 4
  HindpawL: 5
  KneeR: 3
  AnkleR: 4
  HindpawR: 5

# Skeleton connections
skel_conns:
  - [EarL, Snout]
  - [EarR, Snout]
  - [EarL, EarR]
  - [Snout, SpineF]
  - [SpineF, SpineM]
  - [SpineM, TailB]
  - [TailB, TailM]
  - [SpineF, ShoulderL]
  - [ShoulderL, ElbowL]
  - [ElbowL, WristL]
  - [WristL, ForepawL]
  - [SpineF, ShoulderR]
  - [ShoulderR, ElbowR]
  - [ElbowR, WristR]
  - [WristR, ForepawR]
  - [TailB, KneeL]  
  - [KneeL, AnkleL]
  - [AnkleL, HindpawL]
  - [TailB, KneeR]
  - [KneeR, AnkleR]
  - [AnkleR, HindpawR]

# Simplified skeleton connections
simp_skel_conns:
  - [EarL, Snout]
  - [EarR, Snout]
  - [EarL, EarR]
  - [Snout, SpineF]
  - [SpineF, SpineM]
  - [SpineM, TailB]
  - [TailB, TailM]
  - [SpineF, ShoulderL]
  - [ShoulderL, ForepawL]
  - [SpineF, ShoulderR]
  - [ShoulderR, ForepawR]
  - [TailB, KneeL]  
  - [KneeL, HindpawL]
  - [TailB, KneeR]
  - [KneeR, HindpawR]

# Color maps for visualization
c_maps:
  head:
    - [EarL, EarR, Snout]
    - '#FF0000'
  body:
    - [SpineF, SpineM, TailB, TailM]
    - '#00FF00'
  forelimbs:
    - [ShoulderL, ElbowL, WristL, ForepawL, ShoulderR, ElbowR, WristR, ForepawR]
    - '#0000FF'
  hindlimbs:
    - [KneeL, AnkleL, HindpawL, KneeR, AnkleR, HindpawR]
    - '#FFFF00'

simp_c_maps:
  head:
    - [EarL, EarR, Snout]
    - '#FF0000'
  body:
    - [SpineF, SpineM, TailB, TailM]
    - '#00FF00'
  limbs:
    - [ForepawL, ShoulderL, ForepawR, ShoulderR, HindpawL, KneeL, HindpawR, KneeR]
    - '#0000FF'

# Joint credibility scores (higher = more reliable)
joint_creds:
  EarL: 0.5
  EarR: 0.5
  Snout: 0.5
  SpineF: 0.8
  SpineM: 1
  TailB: 1
  TailM: 0.3
  ShoulderL: 0.8
  ElbowL: 0.8
  WristL: 0.5
  ForepawL: 0.3
  ShoulderR: 0.8
  ElbowR: 0.8
  WristR: 0.5
  ForepawR: 0.3
  KneeL: 0.8
  AnkleL: 0.7
  HindpawL: 0.5
  KneeR: 0.8
  AnkleR: 0.7
  HindpawR: 0.5

# Joints to exclude from analysis
joint_exclude:
  - WristL
  - WristR
  - AnkleL
  - AnkleR

# Behavior mapping (syllable number -> behavior name)
bhvr_map:
  0: walking
  1: head_raising
  2: walking
  3: incomplete_rearing-onnest
  4: incomplete_rearing
  5: genital_grooming-complete_rearing-onnest
  6: sniffing
  7: immobile
  8: complete_rearing
  9: sniffing-onnest
  10: body_grooming
  11: face_grooming
  12: rearing-onnest
  13: face_grooming
  14: incomplete_rearing
  15: body_grooming-complete_rearing-onnest
  16: trotting
  17: rearing-onnest
  18: complete_rearing-face_grooming
  19: complete_rearing
  20: sniffing-face_grooming_onnest
  21: complete_rearing
  22: face_grooming-complete_rearing-onnest
  23: rearing-onnest
  24: body_grooming-onnest
  25: body_grooming-complete_rearing-onnest
  26: slightly_mobile
  27: face_grooming-immobile
  28: complete_rearing
  29: walking
  30: other
  31: complete_rearing
  32: other
  33: other
  34: sniffing
  35: other
  37: complete_rearing
  38: immobile
  39: incomplete_rearing_onnest
  40: immobile


